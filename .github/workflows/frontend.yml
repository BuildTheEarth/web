name: Docker Publish Frontend

on:
  push:
    branches: [main,frontend/v2]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check_for_changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 3
      - uses: actions/setup-node@v3
        with:
          node-version: '22.14.0'
      - name: Install turbo
        run: npm install -g turbo@2.4.4 && npm install -g turbo-ignore
      - name: Check for changes
        id: check_for_changes
        run: npx turbo-ignore frontend --fallback=HEAD^1 && echo "has_changes=false" >> "$GITHUB_OUTPUT" || echo "has_changes=true" >> "$GITHUB_OUTPUT"
  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 3
      - name: Install turbo
        run: npm install -g turbo@^2
      - name: Login to Docker
        run: |
          echo "${{ github.token }}" | docker login https://ghcr.io -u ${GITHUB_ACTOR} --password-stdin
      - name: Build the Docker image
        env:
          DOCKER_BUILDKIT: 1
          DATABASE_URL: ${{ secrets.INFISICAL_FRONTEND_DATABASE_URL }}
        run: |
          docker build . \
            --file apps/frontend/Dockerfile \
            --secret id=database_url,env=DATABASE_URL \
            --build-arg CMS_URL="${{ secrets.INFISICAL_FRONTEND_CMS_URL }}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.INFISICAL_FRONTEND_NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_FRONTEND_URL="${{ secrets.INFISICAL_FRONTEND_NEXT_PUBLIC_FRONTEND_URL }}" \
            --build-arg NEXT_PUBLIC_CDN_URL="${{ secrets.INFISICAL_FRONTEND_NEXT_PUBLIC_CDN_URL }}" \
            --build-arg NEXT_PUBLIC_MAP_STYLE_URL="${{ secrets.INFISICAL_FRONTEND_NEXT_PUBLIC_MAP_STYLE_URL }}" \
            --tag ghcr.io/buildtheearth/website-frontend:v2-$(git rev-parse --short HEAD) \
            --tag ghcr.io/buildtheearth/website-frontend:v2-latest
      - name: Docker push tag
        run: docker push ghcr.io/buildtheearth/website-frontend:v2-$(git rev-parse --short HEAD)
      - name: Docker push latest
        run: docker push ghcr.io/buildtheearth/website-frontend:v2-latest
